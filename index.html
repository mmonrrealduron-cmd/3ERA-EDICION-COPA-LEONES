<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | 3ERA COPA LEONES</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>

    <main class="container">
          <div class="logo-area">
            <img src="assets/img/logo.png" alt="Logo">
            <h1>3ERA COPA LEONES</h1>
            <p>Registro Oficial del Torneo de Taekwondo</p>
        </div>

        <form id="registroForm" class="registro-form">

            <div class="input-group">
                <label>Nombre del Atleta</label>
                <input type="text" name="atleta" required>
            </div>

            <div class="input-group">
                <label>Nombre del Dojang</label>
                <input type="text" name="dojang" required>
            </div>
             <div class="input-group">
                <label>Nombre del Entrenador</label>
                <input type="text" name="entrenador" required>
            </div>

            <div class="input-group">
                <label>Edad</label>
                <input type="number" name="edad" required>
            </div>

            <div class="input-group">
                <label>Grado / Cinta</label>

                <select name="cinta" required>
                    <option value="">Selecciona una cinta</option>
                    <option value="Blanca">⬜ Blanca</option>
                    <option value="Amarilla">🟨 Amarilla</option>
                    <option value="Verde">🟩 Verde</option>
                    <option value="Azul">🟦 Azul</option>
                    <option value="Roja">🟥 Roja</option>
                    <option value="Negra">⬛ Negra</option>
                </select>
            </div>

            <div class="modalidades">
                <label>Modalidades</label>

                <div class="checkbox-group">
                    <label><input type="checkbox" value="Combate"> Combate</label>

                    <label><input type="checkbox" value="Formas"> Formas</label>

                    <label><input type="checkbox" value="Circuito"> Circuito</label>

                    <label><input type="checkbox" value="Sin contacto a la cabeza"> Sin contacto a la cabeza</label>
                </div>
                  </div>

            <div class="input-group">
                <label>Varias Modalidades</label>
                <textarea name="extraModalidades" placeholder="Escribe otras modalidades..."></textarea>
            </div>

            <div class="input-group">
                <label>WhatsApp</label>
                <input type="text" name="whatsapp" placeholder="Ejemplo: 8711234567" required>
            </div>

            <button type="submit" class="btn-registro">
                REGISTRAR ATLETA
            </button>
               </form>

        <div id="mensaje"></div>

    </main>

    <script src="script.js"></script>

</body>
</html>
